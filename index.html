<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Redes de Descanso, Mantas e Toalhas em Fios Naturais | NSO Têxtil</title>
</head>
<body>
    <header>
        <div id="header-logo">
            <img src="./assets/img/Logo - 500x500.jpg" alt="Logo da loja NSO Têxtil" />
        </div>
        <nav id="header-links">
            <a href="#">Inicio</a>
            <a href="#">Redes</a>
            <a href="#">Mantas</a>
            <a href="#">Lençois</a>
            <a href="#">Toalhas</a>
            <a href="#">Fios</a>
        </nav>
        <div id="header-icons">
            <img src="./assets/icons/user.svg" alt="Ícone de login" width=20px height=20px />
            <img src="./assets/icons/like.svg" alt="Ícone de curtida" width=20px height=20px />
            <img src="./assets/icons/carrinho.svg" alt="Ícone de carrinho de compras" width=20px height=20px />
        </div>     
    </header>
    <main>
        <section class="section-banner">
            <img src="./assets/img/home.jpeg" alt="Imagem de uma rede com um sofá em uma sala de estar" />
            <div class="div-banner">
                <h1>Renove Seu Lar: Redes de Descanso e Mantas Rústicas em Fios Naturais</h1>
                <p>Descubra a beleza e o conforto das nossas redes, mantas e toalhas feitas com fios naturais.</p>
                <div>
                    <button class="div-button-banner" >Comprar Agora</button>
                    <button class="div-button-banner" >Ver Coleção</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
